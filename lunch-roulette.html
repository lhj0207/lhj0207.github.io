<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のお昼、何食べる？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --machine-body:#2B2E3A;
    --machine-body-dark:#1E202A;
    --machine-body-light:#363A49;
    --panel-cream:#F6EFDC;
    --panel-cream-dark:#E9DFC4;
    --button-amber:#E3A23C;
    --button-amber-dark:#C6812A;
    --accent-red:#C4453E;
    --accent-red-dark:#93312B;
    --accent-green:#5C8A66;
    --accent-green-dark:#436B4C;
    --text-dark:#241F1A;
    --text-cream:#F6EFDC;
    --led-bg:#14150F;
    --led-text:#F2A93B;
    --led-text-dim:#6b4d1c;
    --metal:#494D5C;
    --shadow-deep: rgba(0,0,0,.45);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    min-height:100%;
    background:
      radial-gradient(ellipse at 50% -10%, #2b2e3a 0%, #17181f 55%, #101116 100%);
    font-family:'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif;
    color:var(--text-dark);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding: clamp(16px, 4vw, 48px) 12px 64px;
  }

  .page-caption{
    position:fixed;
    top:14px; left:0; right:0;
    text-align:center;
    color:#7d8194;
    font-size:.7rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    pointer-events:none;
  }

  /* ===== 機体（マシン筐体） ===== */
  .machine{
    width:100%;
    max-width:480px;
    background:
      linear-gradient(160deg, var(--machine-body-light) 0%, var(--machine-body) 45%, var(--machine-body-dark) 100%);
    border-radius:22px;
    padding: 20px 18px 26px;
    box-shadow:
      0 30px 60px -20px var(--shadow-deep),
      0 2px 0 rgba(255,255,255,.05) inset,
      0 -2px 0 rgba(0,0,0,.4) inset;
    position:relative;
    border:1px solid #12131a;
    display:grid;
    grid-template-columns: 1fr;
    grid-template-areas:
      "plate"
      "display"
      "controls"
      "start"
      "slotarea"
      "ticket";
    row-gap:14px;
  }

  /* 縦版（スマホ）ではDOM順そのまま／各要素の個別マージンはgapに一本化 */
  .plate{ grid-area:plate; }
  #ledWindow{ grid-area:display; }
  .controls{ grid-area:controls; margin-top:0; }
  .start-wrap{ grid-area:start; margin:0; }
  .slot{ grid-area:slotarea; margin:0 30px; }
  #ticketDock{ grid-area:ticket; align-self:start; }

  /* ===== デスクトップ／ワイド画面：横型（ランドスケープ）筐体 ===== */
  @media (min-width:860px){
    body{ align-items:center; min-height:100vh; padding-top:24px; padding-bottom:24px; }
    .machine{
      max-width:800px;
      padding: 26px 26px 30px;
      column-gap:26px;
      row-gap:12px;
      grid-template-columns: 300px 1fr;
      grid-template-areas:
        "plate    plate"
        "controls display"
        "controls start"
        "controls slotarea"
        "controls ticket";
      align-items:start;
    }
    .plate{ margin-bottom:2px; text-align:left; padding-left:2px; }
    .controls{
      align-self:stretch;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }
    .led-window{ min-height:96px; }
    .slot{ margin:0 40px; }
    .ticket{ max-width:100%; width:100%; }
  }

  .rivet{
    position:absolute;
    width:9px; height:9px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #8b8f9e, #33353f 70%);
    box-shadow: 0 1px 1px rgba(0,0,0,.6);
  }
  .rivet.tl{ top:12px; left:12px; }
  .rivet.tr{ top:12px; right:12px; }
  .rivet.bl{ bottom:12px; left:12px; }
  .rivet.br{ bottom:12px; right:12px; }

  .plate{
    text-align:center;
    color:#aeb2c4;
    font-size:.68rem;
    letter-spacing:.25em;
    margin-bottom:12px;
    font-weight:500;
  }

  /* ===== LEDディスプレイ窓 ===== */
  .led-window{
    background: var(--led-bg);
    border-radius:10px;
    padding: 18px 14px;
    min-height:104px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    box-shadow:
      inset 0 3px 10px rgba(0,0,0,.8),
      inset 0 0 0 3px #0a0a08,
      0 1px 0 rgba(255,255,255,.06);
    position:relative;
    overflow:hidden;
  }
  .led-window::after{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.035) 0px,
      rgba(255,255,255,.035) 1px,
      transparent 2px,
      transparent 4px
    );
    pointer-events:none;
  }

  .led-text{
    font-family:'DotGothic16', monospace;
    color: var(--led-text);
    text-shadow: 0 0 6px rgba(242,169,59,.65), 0 0 1px rgba(242,169,59,.9);
    letter-spacing:.04em;
    text-align:center;
    line-height:1.5;
  }
  .led-title{ font-size: clamp(1.15rem, 5vw, 1.55rem); }
  .led-sub{ font-size:.85rem; color: var(--led-text-dim); }

  .reel-row{
    display:flex;
    gap:10px;
    width:100%;
    justify-content:center;
  }
  .reel{
    flex:1;
    min-width:0;
    text-align:center;
    font-family:'DotGothic16', monospace;
    color: var(--led-text);
    text-shadow: 0 0 6px rgba(242,169,59,.6);
    font-size: clamp(.95rem, 4.4vw, 1.2rem);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding:2px 4px;
  }
  .reel-label{
    font-size:.6rem;
    color:#7a5a24;
    letter-spacing:.2em;
    margin-bottom:2px;
  }
  @keyframes reelStop{
    0%{ transform:translateY(-4px); }
    55%{ transform:translateY(3px); }
    100%{ transform:translateY(0); }
  }
  .reel.settled{ animation: reelStop .28s ease-out; }

  .led-error{ color:#e06a5f !important; text-shadow:0 0 6px rgba(224,106,95,.6) !important; }

  /* ===== コントロールパネル ===== */
  .controls{
    background: var(--panel-cream);
    border-radius:12px;
    padding:14px 14px 6px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 6px 14px rgba(0,0,0,.25);
  }

  .field{ margin-bottom:12px; }
  .field-label{
    font-size:.72rem;
    font-weight:700;
    color:#5a4c2e;
    letter-spacing:.06em;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .field-label::before{
    content:"";
    width:6px; height:6px;
    background: var(--button-amber-dark);
    border-radius:1px;
    display:inline-block;
    transform:rotate(45deg);
  }

  .btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .choice-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-size:.78rem;
    font-weight:500;
    color:var(--text-dark);
    background: linear-gradient(180deg, #fffdf6, #ecdfbf);
    padding:7px 12px;
    border-radius:7px;
    box-shadow: 0 2px 0 var(--panel-cream-dark), 0 3px 4px rgba(0,0,0,.15);
    transition: transform .08s ease, box-shadow .08s ease, background .12s ease, color .12s ease;
  }
  .choice-btn:active{ transform: translateY(2px); box-shadow:0 0 0 rgba(0,0,0,.15); }
  .choice-btn[aria-pressed="true"]{
    background: linear-gradient(180deg, #f3bb62, var(--button-amber-dark));
    color:#2a1c05;
    box-shadow: 0 2px 0 #93650f, 0 3px 5px rgba(0,0,0,.25) inset;
  }
  .choice-btn.excluded[aria-pressed="true"]{
    background: linear-gradient(180deg, #d97169, var(--accent-red-dark));
    color:#fff0ee;
    text-decoration: line-through;
    text-decoration-thickness:1.5px;
  }
  .choice-btn:focus-visible{
    outline: 3px solid var(--accent-green);
    outline-offset:2px;
  }

  /* ===== スタートボタン ===== */
  .start-wrap{
    display:flex;
    justify-content:center;
  }
  .start-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    width:132px; height:132px;
    border-radius:50%;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:900;
    font-size:1.05rem;
    color:#fff0ee;
    letter-spacing:.05em;
    background: radial-gradient(circle at 35% 28%, #e2685f, var(--accent-red) 55%, var(--accent-red-dark) 100%);
    box-shadow:
      0 8px 0 var(--accent-red-dark),
      0 14px 20px rgba(0,0,0,.45),
      inset 0 2px 4px rgba(255,255,255,.35);
    transition: transform .07s ease, box-shadow .07s ease;
  }
  .start-btn:active:not(:disabled){
    transform: translateY(6px);
    box-shadow: 0 2px 0 var(--accent-red-dark), 0 4px 8px rgba(0,0,0,.35), inset 0 2px 4px rgba(255,255,255,.35);
  }
  .start-btn:disabled{
    filter: grayscale(.35) brightness(.85);
    cursor: default;
  }
  .start-btn:focus-visible{ outline: 3px solid var(--accent-green); outline-offset:4px; }

  /* ===== 食券排出口 ===== */
  .slot{
    height:14px;
    background: var(--machine-body-dark);
    border-radius:3px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,.8);
  }

  .ticket-dock{
    min-height:4px;
    display:flex;
    justify-content:center;
  }

  .ticket{
    width:88%;
    max-width:380px;
    background: var(--panel-cream);
    border-radius: 4px 4px 10px 10px;
    padding:16px 18px 18px;
    margin-top:-2px;
    position:relative;
    box-shadow: 0 14px 24px -8px rgba(0,0,0,.55);
    transform: translateY(-14px) rotate(-1deg);
    opacity:0;
    animation: ticketDrop .5s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  @keyframes ticketDrop{
    0%{ opacity:0; transform: translateY(-20px) rotate(-1deg); }
    100%{ opacity:1; transform: translateY(0) rotate(-1deg); }
  }
  .ticket::before{
    content:"";
    position:absolute;
    top:-1px; left:0; right:0; height:8px;
    background-image: radial-gradient(circle, var(--machine-body-dark) 3px, transparent 3.2px);
    background-size: 14px 14px;
    background-position: 0 -6px;
  }

  .ticket-eyebrow{
    font-size:.65rem;
    letter-spacing:.2em;
    color:#8a7645;
    font-weight:700;
    margin-bottom:8px;
  }
  .ticket-shop{
    font-size:.85rem;
    color:#6b5a34;
    font-weight:500;
  }
  .ticket-menu{
    font-size:1.35rem;
    font-weight:900;
    color:var(--text-dark);
    line-height:1.3;
    margin: 4px 0 10px;
  }
  .ticket-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:12px;
  }
  .tag{
    font-size:.68rem;
    padding:3px 9px;
    border-radius:99px;
    background: var(--machine-body);
    color:var(--panel-cream);
    font-weight:500;
  }
  .tag.genre{ background: var(--accent-green-dark); }

  .ticket-price-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-top:1.5px dashed #cbb98c;
    padding-top:10px;
  }
  .ticket-price-label{ font-size:.72rem; color:#6b5a34; }
  .ticket-price{
    font-family:'DotGothic16', monospace;
    font-size:1.7rem;
    color:var(--accent-red-dark);
  }

  .stamp{
    position:absolute;
    top:14px; right:16px;
    width:56px; height:56px;
    border:2.5px solid var(--accent-red);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--accent-red);
    font-size:.62rem;
    font-weight:700;
    text-align:center;
    line-height:1.15;
    transform: rotate(14deg);
    opacity:.85;
  }

  .again-wrap{
    display:flex;
    justify-content:center;
    margin-top:10px;
  }
  .again-btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-size:.8rem;
    font-weight:700;
    color:var(--panel-cream);
    background: var(--accent-green-dark);
    padding:9px 20px;
    border-radius:99px;
    box-shadow: 0 2px 0 #2e4a34;
    transition: transform .08s ease;
  }
  .again-btn:active{ transform: translateY(2px); }
  .again-btn:focus-visible{ outline:3px solid var(--button-amber); outline-offset:2px; }

  .sr-only{
    position:absolute; width:1px; height:1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
  }

  @media (max-width:380px){
    .start-btn{ width:112px; height:112px; font-size:.92rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .ticket{ animation-duration:.01s; }
    .reel.settled{ animation-duration:.01s; }
  }
</style>
</head>
<body>
<div class="page-caption">Nihon University · Funabashi Campus — Lunch Ticket Machine</div>

<main class="machine" role="main" aria-labelledby="app-title">
  <span class="rivet tl"></span><span class="rivet tr"></span>
  <span class="rivet bl"></span><span class="rivet br"></span>

  <p class="plate">船橋キャンパス &nbsp;ランチくじ引き機</p>

  <section class="led-window" id="ledWindow" aria-live="polite">
    <div id="ledIdle">
      <p class="led-text led-title" id="app-title">今日のお昼、何食べる？</p>
      <p class="led-text led-sub">条件をえらんで「ランダムスタート」を押してね</p>
    </div>
    <div id="ledReels" class="reel-row" hidden>
      <div>
        <p class="reel-label">店舗</p>
        <p class="reel" id="reelShop">− − −</p>
      </div>
      <div>
        <p class="reel-label">メニュー</p>
        <p class="reel" id="reelMenu">− − −</p>
      </div>
    </div>
  </section>

  <form class="controls" id="controlPanel">
    <div class="field">
      <p class="field-label">エリア</p>
      <div class="btn-row" data-group="area" role="group" aria-label="エリアを選ぶ"></div>
    </div>
    <div class="field">
      <p class="field-label">予算</p>
      <div class="btn-row" data-group="budget" role="group" aria-label="予算を選ぶ"></div>
    </div>
    <div class="field">
      <p class="field-label">ジャンル</p>
      <div class="btn-row" data-group="genre" role="group" aria-label="ジャンルを選ぶ"></div>
    </div>
    <div class="field">
      <p class="field-label">除外店舗（タップで除外）</p>
      <div class="btn-row" data-group="exclude" role="group" aria-label="除外する店舗を選ぶ"></div>
    </div>
  </form>

  <div class="start-wrap">
    <button type="button" class="start-btn" id="startBtn">
      ランダム<br>スタート
    </button>
  </div>

  <div class="slot"></div>
  <div class="ticket-dock" id="ticketDock" aria-live="polite"></div>
</main>

<script>
(function(){
  "use strict";

  /* ===================== データベース ===================== */
  var shops = [
    { name:"学生食堂", area:"学内", menu:[
      {name:"醤油ラーメン", price:220, genre:"ラーメン"},
      {name:"汁なし担々麺", price:360, genre:"ラーメン"},
      {name:"辛肉みそラーメン", price:360, genre:"ラーメン"},
      {name:"極上とく旨ラーメン", price:360, genre:"ラーメン"},
      {name:"カレーライス", price:270, genre:"定食"},
      {name:"バターチキンカレー", price:400, genre:"定食"},
      {name:"タコライス", price:400, genre:"丼"},
      {name:"ソースカツ丼", price:400, genre:"丼"},
      {name:"ねぎ塩豚丼", price:400, genre:"丼"},
      {name:"からあげ丼", price:400, genre:"丼"},
      {name:"豚汁定食", price:450, genre:"定食"},
      {name:"油淋鶏定食", price:450, genre:"定食"},
      {name:"チキン南蛮定食", price:450, genre:"定食"}
    ]},
    { name:"ファミリーマート", area:"学内", menu:[
      {name:"お弁当", priceMin:450, priceMax:700, genre:"コンビニ"},
      {name:"おにぎり", priceMin:150, priceMax:250, genre:"コンビニ"},
      {name:"パスタ", priceMin:450, priceMax:650, genre:"コンビニ"},
      {name:"サンドイッチ", priceMin:250, priceMax:450, genre:"コンビニ"},
      {name:"パン", priceMin:120, priceMax:250, genre:"コンビニ"}
    ]},
    { name:"すき家", area:"学校周辺", menu:[
      {name:"牛丼（並盛）", price:480, genre:"牛丼"},
      {name:"ねぎ玉牛丼", price:650, genre:"牛丼"},
      {name:"チーズ牛丼", price:680, genre:"牛丼"},
      {name:"キムチ牛丼", price:650, genre:"牛丼"},
      {name:"高菜明太マヨ牛丼", price:690, genre:"牛丼"},
      {name:"牛カルビ焼肉丼", price:690, genre:"丼"},
      {name:"カレー", price:490, genre:"定食"},
      {name:"チーズカレー", price:650, genre:"定食"},
      {name:"おろしポン酢牛丼", price:650, genre:"牛丼"},
      {name:"わさび山かけ牛丼", price:680, genre:"牛丼"}
    ]},
    { name:"マクドナルド", area:"学校周辺", menu:[
      {name:"ビッグマック", priceSingle:480, priceSet:780, genre:"ハンバーガー"},
      {name:"ダブルチーズバーガー", priceSingle:430, priceSet:730, genre:"ハンバーガー"},
      {name:"てりやきマックバーガー", priceSingle:400, priceSet:700, genre:"ハンバーガー"},
      {name:"フィレオフィッシュ", priceSingle:400, priceSet:700, genre:"ハンバーガー"},
      {name:"チキンフィレオ", priceSingle:420, priceSet:720, genre:"ハンバーガー"},
      {name:"えびフィレオ", priceSingle:450, priceSet:750, genre:"ハンバーガー"},
      {name:"ハンバーガー", priceSingle:190, genre:"ハンバーガー"},
      {name:"チーズバーガー", priceSingle:220, genre:"ハンバーガー"},
      {name:"マックチキン", priceSingle:190, genre:"ハンバーガー"},
      {name:"ベーコンレタスバーガー", priceSingle:420, priceSet:720, genre:"ハンバーガー"}
    ]},
    { name:"ガスト", area:"学校周辺", menu:[
      {name:"日替わりランチ", price:790, genre:"定食"},
      {name:"チーズINハンバーグ", price:890, genre:"定食"},
      {name:"若鶏スパイス焼き", price:890, genre:"定食"},
      {name:"オムライス", price:790, genre:"定食"},
      {name:"ビーフカレー", price:790, genre:"定食"},
      {name:"ミートソース", price:790, genre:"定食"},
      {name:"カルボナーラ", price:890, genre:"定食"},
      {name:"和風ハンバーグ", price:890, genre:"定食"},
      {name:"うどん", price:690, genre:"定食"},
      {name:"唐揚げ定食", price:890, genre:"定食"}
    ]}
  ];

  var AREA_OPTS   = ["指定なし","学内","学校周辺"];
  var BUDGET_OPTS = ["指定なし","〜500円","500〜800円","800円〜"];
  var GENRE_OPTS  = ["指定なし","定食","丼","ラーメン","牛丼","ハンバーガー","コンビニ"];
  var SHOP_NAMES  = shops.map(function(s){ return s.name; });

  var state = {
    area:"指定なし",
    budget:"指定なし",
    genre:"指定なし",
    exclude: []
  };

  /* ===================== UIビルド ===================== */
  function buildGroup(container, options, key, multi){
    options.forEach(function(opt){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "choice-btn" + (multi ? " excluded" : "");
      btn.textContent = opt;
      var pressed = multi ? state[key].indexOf(opt) !== -1 : state[key] === opt;
      btn.setAttribute("aria-pressed", pressed ? "true" : "false");
      btn.addEventListener("click", function(){
        if(multi){
          var idx = state[key].indexOf(opt);
          if(idx === -1){ state[key].push(opt); } else { state[key].splice(idx,1); }
          btn.setAttribute("aria-pressed", idx === -1 ? "true" : "false");
        } else {
          state[key] = opt;
          Array.prototype.forEach.call(container.children, function(b){
            b.setAttribute("aria-pressed", b === btn ? "true" : "false");
          });
        }
      });
      container.appendChild(btn);
    });
  }

  buildGroup(document.querySelector('[data-group="area"]'), AREA_OPTS, "area", false);
  buildGroup(document.querySelector('[data-group="budget"]'), BUDGET_OPTS, "budget", false);
  buildGroup(document.querySelector('[data-group="genre"]'), GENRE_OPTS, "genre", false);
  buildGroup(document.querySelector('[data-group="exclude"]'), SHOP_NAMES, "exclude", true);

  /* ===================== 候補生成 ===================== */
  function randInt(min, max){
    return Math.round((min + Math.random() * (max - min)) / 10) * 10;
  }

  function inBudget(price, budget){
    if(budget === "指定なし") return true;
    if(budget === "〜500円") return price <= 500;
    if(budget === "500〜800円") return price > 500 && price <= 800;
    if(budget === "800円〜") return price > 800;
    return true;
  }

  function buildCandidates(){
    var list = [];
    shops.forEach(function(shop){
      if(state.area !== "指定なし" && shop.area !== state.area) return;
      if(state.exclude.indexOf(shop.name) !== -1) return;

      shop.menu.forEach(function(item){
        if(state.genre !== "指定なし" && item.genre !== state.genre) return;

        if(item.priceSingle !== undefined){
          list.push({ shop:shop.name, area:shop.area, name:item.name + "（単品）", price:item.priceSingle, genre:item.genre });
          if(item.priceSet !== undefined){
            list.push({ shop:shop.name, area:shop.area, name:item.name + "（セット）", price:item.priceSet, genre:item.genre });
          }
        } else if(item.priceMin !== undefined){
          list.push({ shop:shop.name, area:shop.area, name:item.name, price:randInt(item.priceMin, item.priceMax), genre:item.genre });
        } else {
          list.push({ shop:shop.name, area:shop.area, name:item.name, price:item.price, genre:item.genre });
        }
      });
    });
    return list.filter(function(c){ return inBudget(c.price, state.budget); });
  }

  /* ===================== 抽選アニメーション ===================== */
  var ledIdle  = document.getElementById("ledIdle");
  var ledReels = document.getElementById("ledReels");
  var reelShop = document.getElementById("reelShop");
  var reelMenu = document.getElementById("reelMenu");
  var startBtn = document.getElementById("startBtn");
  var ticketDock = document.getElementById("ticketDock");
  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function spinReel(el, pool, finalText, done){
    if(reduceMotion){
      el.textContent = finalText;
      el.classList.add("settled");
      done();
      return;
    }
    var delay = 55;
    var elapsed = 0;
    var maxElapsed = 780;

    function tick(){
      if(elapsed >= maxElapsed){
        el.textContent = finalText;
        el.classList.remove("settled");
        void el.offsetWidth;
        el.classList.add("settled");
        done();
        return;
      }
      el.textContent = pool[Math.floor(Math.random() * pool.length)];
      delay = delay * 1.16;
      elapsed += delay;
      setTimeout(tick, delay);
    }
    tick();
  }

  function showEmptyState(){
    ledIdle.hidden = false;
    ledReels.hidden = true;
    ledIdle.innerHTML =
      '<p class="led-text led-error">該当するメニューが見つかりませんでした</p>' +
      '<p class="led-text led-sub">条件を減らしてもう一度お試しください</p>';
  }

  function resetIdle(){
    ledIdle.hidden = false;
    ledReels.hidden = true;
    ledIdle.innerHTML =
      '<p class="led-text led-title">今日のお昼、何食べる？</p>' +
      '<p class="led-text led-sub">条件をえらんで「ランダムスタート」を押してね</p>';
  }

  function renderTicket(result){
    ticketDock.innerHTML = "";
    var ticket = document.createElement("div");
    ticket.className = "ticket";
    ticket.innerHTML =
      '<div class="stamp">本日の<br>一食</div>' +
      '<p class="ticket-eyebrow">食券 &nbsp;RANDOM PICK</p>' +
      '<p class="ticket-shop">' + result.shop + '（' + result.area + '）</p>' +
      '<p class="ticket-menu">' + result.name + '</p>' +
      '<div class="ticket-meta">' +
        '<span class="tag genre">' + result.genre + '</span>' +
      '</div>' +
      '<div class="ticket-price-row">' +
        '<span class="ticket-price-label">お会計</span>' +
        '<span class="ticket-price">¥' + result.price.toLocaleString() + '</span>' +
      '</div>';
    ticketDock.appendChild(ticket);

    var againWrap = document.createElement("div");
    againWrap.className = "again-wrap";
    var againBtn = document.createElement("button");
    againBtn.type = "button";
    againBtn.className = "again-btn";
    againBtn.textContent = "もう一度回す";
    againBtn.addEventListener("click", runDraw);
    againWrap.appendChild(againBtn);
    ticketDock.appendChild(againWrap);
  }

  function runDraw(){
    var candidates = buildCandidates();
    ticketDock.innerHTML = "";

    if(candidates.length === 0){
      showEmptyState();
      return;
    }

    var final = candidates[Math.floor(Math.random() * candidates.length)];
    var shopPool = candidates.map(function(c){ return c.shop; });
    var menuPool = candidates.filter(function(c){ return c.shop === final.shop; }).map(function(c){ return c.name; });
    if(menuPool.length === 0) menuPool = candidates.map(function(c){ return c.name; });

    startBtn.disabled = true;
    startBtn.textContent = "抽選中…";
    ledIdle.hidden = true;
    ledReels.hidden = false;
    reelShop.textContent = "− − −";
    reelMenu.textContent = "− − −";

    spinReel(reelShop, shopPool, final.shop, function(){
      spinReel(reelMenu, menuPool, final.name, function(){
        renderTicket(final);
        startBtn.disabled = false;
        startBtn.innerHTML = "ランダム<br>スタート";
      });
    });
  }

  startBtn.addEventListener("click", runDraw);
  resetIdle();
})();
</script>
</body>
</html>
